<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현대적 분석 대시보드</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="layout-dashboard"></i>
                <span>제미나이 대시보드</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><i data-lucide="home"></i> <span>개요</span></li>
                    <li><i data-lucide="bar-chart-2"></i> <span>분석</span></li>
                    <li><i data-lucide="users"></i> <span>사용자</span></li>
                    <li><i data-lucide="folder"></i> <span>프로젝트</span></li>
                    <li><i data-lucide="settings"></i> <span>설정</span></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <i data-lucide="log-out"></i> <span>로그아웃</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="데이터 검색...">
                </div>
                <div class="user-profile">
                    <i data-lucide="bell" class="icon"></i>
                    <div class="avatar">JS</div>
                    <span>제이크 신</span>
                </div>
            </header>

            <!-- Dashboard Body -->
            <div class="dashboard-body">
                <div class="header-section">
                    <h1>시스템 개요</h1>
                    <button class="btn-primary"><i data-lucide="plus"></i> 새 보고서</button>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    {% for stat in stats %}
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">{{ stat.title }}</span>
                            <i data-lucide="{{ stat.icon }}"></i>
                        </div>
                        <div class="stat-value">{{ stat.value }}</div>
                        <div class="stat-footer">
                            <span class="trend {{ 'positive' if '+' in stat.trend else 'negative' }}">
                                {{ stat.trend }}
                            </span>
                            <span>지난달 대비</span>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <!-- Charts & Table Section -->
                <div class="content-grid">
                    <div class="card chart-card">
                        <h3>수익 개요</h3>
                        <div class="chart-placeholder">
                            <div class="chart-bar" style="height: 40%"></div>
                            <div class="chart-bar" style="height: 70%"></div>
                            <div class="chart-bar" style="height: 55%"></div>
                            <div class="chart-bar" style="height: 90%"></div>
                            <div class="chart-bar" style="height: 65%"></div>
                        </div>
                    </div>

                    <div class="card table-card">
                        <h3>최근 활동</h3>
                        <table class="activity-table">
                            <thead>
                                <tr>
                                    <th>사용자</th>
                                    <th>활동</th>
                                    <th>시간</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for activity in activities %}
                                <tr>
                                    <td><strong>{{ activity.user }}</strong></td>
                                    <td>{{ activity.action }}</td>
                                    <td class="time">{{ activity.time }}</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', path='js/script.js') }}"></script>
</body>
</html>
