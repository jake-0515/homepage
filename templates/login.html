<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 제미나이 대시보드</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f1f5f9;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header i { color: #6366f1; width: 48px; height: 48px; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #64748b; font-weight: 500; }
        .form-group input { 
            width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #6366f1; }
        .btn-login { 
            width: 100%; background: #6366f1; color: white; border: none; padding: 0.75rem; 
            border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-login:hover { background: #4f46e5; }
        .error-msg { color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i data-lucide="layout-dashboard"></i>
                <h2>제미나이 로그인</h2>
            </div>
            <form action="/login" method="post">
                <div class="form-group">
                    <label>사용자 이름</label>
                    <input type="text" name="username" placeholder="사용자 이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn-login">로그인</button>
            </form>
            <p style="font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 1.5rem;">
                기본 계정: admin / admin123 또는 student / student123
            </p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
